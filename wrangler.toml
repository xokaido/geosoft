name = "geosoft"
main = "worker/src/index.ts"
compatibility_date = "2024-09-23"

# Custom hostname (zone kadri.ge must be on Cloudflare; deploy creates SSL + routing).
[[routes]]
pattern = "car.kadri.ge"
custom_domain = true

# Bundle markdown as string imports (e.g. chat system prompt).
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "geosoft-chat-db"
database_id = "86fed29e-3de0-4368-a9c9-aed6d4a15bac"
migrations_dir = "worker/migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "geosoft"

[[vectorize]]
binding = "VECTORIZE"
index_name = "geosoft-rag"

# Vite writes the SPA here; one deploy surface for CI + Wrangler v4
[assets]
directory = "dist"
binding = "ASSETS"

[vars]
# Workers AI caps this per model; high values request as much output as the model allows.
MAX_CHAT_OUTPUT_TOKENS = "131072"
# Batched vision: OpenRouter (and upstream) often cannot reliably serve 8–12 image URLs in one call.
# Each batch runs a smaller sub-request, then a final text-only answer uses all notes.
VISION_IMAGES_PER_UPSTREAM_CALL = "3"
# Hard cap for images per /api/chat request (app UI should match).
MAX_CHAT_IMAGES = "12"

# OpenRouter (https://openrouter.ai/docs) — chat uses OpenRouter; RAG embeddings still use Workers AI.
# Required secret: wrangler secret put OPENROUTER_API_KEY
# Optional: public URL of your app for OpenRouter rankings (HTTP-Referer)
OPENROUTER_HTTP_REFERER = "http://localhost:5173"
OPENROUTER_APP_TITLE = "GeoSoft AI Chat"

# D1 `app_users` for normal logins (see README). Optional fallback if D1 row missing / wrong: same creds as before multi-user.
AUTH_USERNAME = "admin"
AUTH_PASSWORD = "changeme"

# For production, set SESSION_SECRET via `wrangler secret put`.
SESSION_SECRET = "dev-only-change-me-use-wrangler-secret-in-prod"
